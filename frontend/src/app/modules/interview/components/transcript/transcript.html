<div class="transcript-container">
    <div class="transcript-header">
        <h3>Interview Transcript</h3>
    </div>

    <div class="messages" #scrollContainer (scroll)="onScroll($event)">
        @for (msg of store.transcript(); track $index) {
        <div class="message" [class.ai]="msg.role === Role.AI" [class.user]="msg.role === Role.USER">
            <div class="message-meta">
                <span class="role">{{ msg.role === Role.AI ? 'HRbot' : 'You' }}</span>
                <span class="time">{{ msg.timestamp }}</span>
            </div>
            <div class="content">{{ msg.text }}</div>
        </div>
        }

        <div class="empty-state" *ngIf="store.transcript().length === 0">
            <p>Your conversation transcript will appear here.</p>
        </div>
    </div>

    <div class="typing-indicator" *ngIf="store.status() === InterviewStatus.PROCESSING">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <!-- Scroll & Hide Indicator -->
    <div class="scroll-more-indicator" [class.visible]="showScrollIndicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>
