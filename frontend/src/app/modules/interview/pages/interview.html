<div class="interview-spatial-layout">

    <!-- CENTER: AI Core -->
    <div class="orb-stage">
        <app-ai-orb></app-ai-orb>
        <div class="orb-reflection"></div>
    </div>

    <!-- BOTTOM: Control Deck -->
    <div class="console-wrapper">
        <app-interview-console></app-interview-console>
    </div>

    <!-- TOP RIGHT: Floating Transcript (Retractable) -->
    <app-floating-glass-panel width="500px" height="auto" positionClass="top-right">
        <app-transcript></app-transcript>
    </app-floating-glass-panel>

    <!-- BOTTOM RIGHT: Floating Webcam -->
    <app-floating-glass-panel width="320px" height="210px" positionClass="bottom-right">
        <app-webcam></app-webcam>
    </app-floating-glass-panel>

</div>
