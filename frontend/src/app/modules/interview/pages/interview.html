<div class="interview-grid-layout">

    <!-- MAIN CENTER STAGE (Orb & Console) -->
    <div class="main-stage">
        <div class="orb-container">
            <app-ai-avatar></app-ai-avatar>
            <div class="orb-reflection"></div>
        </div>

        <div class="console-wrapper">
            <app-interview-console></app-interview-console>
        </div>
    </div>

    <!-- RIGHT SIDEBAR (Transcript & Webcam) -->
    <div class="side-panel">

        <app-floating-glass-panel class="transcript-wrapper" width="100%" height="100%">
            <app-transcript></app-transcript>
        </app-floating-glass-panel>

        <app-floating-glass-panel class="webcam-wrapper" width="100%" height="100%">
            <app-webcam></app-webcam>
        </app-floating-glass-panel>

    </div>

    <!-- ERROR TOAST -->
    <div class="error-toast glass" [class.visible]="!!store.error()" aria-live="assertive">
        <div class="error-content">
            <span class="error-icon">⚠️</span>
            <span class="error-message">{{ store.error() }}</span>
        </div>
        <button class="dismiss-btn" (click)="store.setError(null)" aria-label="Dismiss Error">&times;</button>
    </div>

</div>
